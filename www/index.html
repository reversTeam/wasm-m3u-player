<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WASM Video Player</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <h1>WASM Video Player</h1>

        <div class="url-bar">
            <input type="text" id="url-input" placeholder="Enter video or M3U playlist URL..." />
            <button id="load-btn">Load</button>
            <label class="file-btn" for="file-input">File</label>
            <input type="file" id="file-input" accept="video/*,audio/*,.mkv,.webm,.mp4,.m4v,.avi,.m3u,.m3u8" class="hidden" />
        </div>

        <div class="player-container" id="player-container">
            <canvas id="video-canvas" width="640" height="360"></canvas>
            <!-- PlayerControls overlay is injected here dynamically -->
        </div>

        <div id="status-bar">Status: Idle</div>
        <div id="error-display" class="hidden"></div>

        <div id="media-info" class="hidden">
            <h3>Media Info</h3>
            <ul id="media-info-list"></ul>
        </div>

        <div id="playlist-panel" class="hidden">
            <h3>Playlist</h3>
            <ul id="playlist-list"></ul>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
